name: Assemble release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  assemble:
    name: Assemble TRNSYS bundles
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out manifest
        uses: actions/checkout@v6

      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TRN_RELEASE_APP_ID }}
          private-key: ${{ secrets.TRN_RELEASE_APP_KEY }}
          owner: trnsys

      - name: Check out build-tools
        uses: actions/checkout@v6
        with:
          repository: trnsys/build-tools
          ref: v0.9.0
          token: ${{ steps.app-token.outputs.token }}
          path: .build-tools

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Create Python environment
        run: uv venv

      - name: Install build-tools
        run: uv pip install ./.build-tools

      - name: Assemble macOS
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: uv run python -m trnsys_bundle assemble macos

      - name: Assemble Windows
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: uv run python -m trnsys_bundle assemble windows

      - name: Assemble Linux
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: uv run python -m trnsys_bundle assemble linux

      - name: Assemble CoreDev overlay
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          uv run python -m trnsys_bundle assemble-coredev-overlay \
            --composition .build-tools/scaffolds/coredev/coredev.toml \
            --repo-root .

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version' manifest.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          gh release create "$GITHUB_REF_NAME" \
            --title "TRNSYS $VERSION" \
            --generate-notes \
            trnsys-macos-arm64.tar.gz \
            trnsys-windows-x64.zip \
            trnsys-linux-x64.tar.gz \
            coredev-overlay-windows-x64.zip \
            SHA256SUMS.txt
