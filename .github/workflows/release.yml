name: Assemble release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  assemble:
    name: Assemble TRNSYS bundles
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out manifest
        uses: actions/checkout@v6

      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TRN_RELEASE_APP_ID }}
          private-key: ${{ secrets.TRN_RELEASE_APP_KEY }}
          owner: trnsys

      - name: Assemble macOS
        uses: trnsys/build-tools/.github/actions/bundle-assemble@v0.5.1
        with:
          platform: macos
          token: ${{ steps.app-token.outputs.token }}

      - name: Assemble Windows
        uses: trnsys/build-tools/.github/actions/bundle-assemble@v0.5.1
        with:
          platform: windows
          token: ${{ steps.app-token.outputs.token }}

      - name: Assemble Linux
        uses: trnsys/build-tools/.github/actions/bundle-assemble@v0.5.1
        with:
          platform: linux
          token: ${{ steps.app-token.outputs.token }}

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version' manifest.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          gh release create "$GITHUB_REF_NAME" \
            --title "TRNSYS $VERSION" \
            --generate-notes \
            trnsys-macos-arm64.zip \
            trnsys-windows-x64.zip \
            trnsys-linux-x64.zip \
            SHA256SUMS.txt
