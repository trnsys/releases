name: Assemble release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  assemble:
    name: Assemble TRNSYS bundles
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TRN_RELEASE_APP_ID }}
          private-key: ${{ secrets.TRN_RELEASE_APP_KEY }}
          owner: trnsys
          repositories: kernel,engine,standard-types,solar-calcs,fluid-properties,trnexe,runtime-cstb,runtime-transsolar,build-tools

      - name: Check out build-tools
        uses: actions/checkout@v6
        with:
          repository: trnsys/build-tools
          ref: v0.5.0
          token: ${{ steps.app-token.outputs.token }}
          path: .build-tools

      - name: Install build-tools
        run: uv pip install --system ./.build-tools

      - name: Assemble macOS arm64
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python -m trnsys_bundle assemble macos

      - name: Assemble Windows x64
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python -m trnsys_bundle assemble windows

      - name: Assemble Linux x64
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python -m trnsys_bundle assemble linux

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version' manifest.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          gh release create "$GITHUB_REF_NAME" \
            --title "TRNSYS $VERSION" \
            --generate-notes \
            trnsys-macos-arm64.zip \
            trnsys-windows-x64.zip \
            trnsys-linux-x64.zip \
            SHA256SUMS.txt
