[release]
version = "19.0.0-alpha.17"

[components]
kernel = "v0.3.3"
engine = "v0.3.3"
standard-types = "v0.2.0"
solar-calcs = "v0.2.0"
fluid-properties = "v0.2.0"
trnexe = "v0.3.4"
runtime-cstb = "v1.1.0"
runtime-transsolar = "v1.1.0"

[layout]
bin = ["kernel", "engine", "solar-calcs", "fluid-properties", "trnexe", "standard-types"]
resources = ["kernel-resources"]

[platforms]
macos = { arch = "arm64", bin = "bin", resources = "resources" }
windows = { arch = "x64", bin = "Exe", resources = "Resources" }
linux = { arch = "x64", bin = "bin", resources = "resources" }

[vendor.windows.runtime-cstb]
kind = "release-asset"
asset = "studio.zip"
target = "Studio"

[vendor.windows.runtime-transsolar]
kind = "release-asset"
asset = "transsolar.zip"
target = "Transsolar"
