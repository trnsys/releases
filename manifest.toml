# Pins component versions for bundle assembly.
# The assembly workflow reads this file to know which version of each component to fetch.
# Update versions here, commit, then tag to trigger a new release.

[release]
version = "19.0.0-alpha.7"

[components]
kernel = "v0.2.2"
engine = "v0.2.2"
standard-types = "v0.1.1"
solar-calcs = "v0.1.1"
fluid-properties = "v0.1.1"
trnexe = "v0.3.1"
runtime-cstb = "v1.0.0"
runtime-transsolar = "v1.0.0"
